# KTouchBar Configuration
# Copy this file to ~/.config/ktouchbar/configs/config.toml and edit to customize.
# The daemon loads system config first, then overrides from user config.

[global]
debug = false                                                    # print debug info
show_outline = false                                             # global toggle for widget outlines
outline_color = [0.3, 0.3, 0.3]                                  # grayscale or RGB: used for widget outlines
active_color = 0.0                                               # highlight color when a widget is pressed
slider_live_update = true                                        # write slider value during drag (true) or on release (false)
slider_track_outline = [0.2, 0.2, 0.2]                           # 1px outline around slider bar track; omit for none
enable_pixel_shift = false                                       # anti burn-in: shift pixels every few seconds
font_template = "CaskaydiaMonoNerdFontMono:light"                # fontconfig pattern
font_size = 32                                                   # default font size for text widgets
icon_size = 48                                                   # default icon size for icon/battery widgets
icon_theme = "auto"                                              # icon theme name, or "auto" to detect from system
adaptive_brightness = true                                       # follow display brightness
active_brightness = 128                                          # brightness level when touchbar is active (0-255)
brightness_dim_timeout_ms = 120000                               # idle time before dimming (ms)
brightness_off_timeout_ms = 300000                               # idle time before turning off (ms)
dimmed_brightness = 1                                            # dim level (0-255)
panel_timeout_seconds = 2                                        # auto-return from sub-panels (seconds)
default_padding = 10                                             # used when a widget sets padding = "default"

# ── Layers ──────────────────────────────────────────────────────
# [layers.main] — shown by default
# [layers.fn]   — shown when the Fn key is held
#
# Widget format (inline TOML table):
#   { widget = "button", icon = "...", text = "...", action = { key = ["KeyName"] } }
#
# Widget types: button, slider, battery, clock, dynamic, container
# Action types: { key = ["Key"] }, { panel = "name" }, { exec = "cmd" }, { back = true }
#
# Per-widget common fields:
#   show_outline, outline_color, active_color, padding, padding_left/right,
#   margin, margin_left/right, font_size, icon_size, theme, slider_track_outline
#
# Layout:
#   - Widgets with explicit padding are fixed-width
#   - Widgets without padding auto-expand to fill remaining space equally
#   - padding = "default" uses default_padding from [global]
#   - margin adds spacing outside the widget (both sides by default)

# ── Main layer ──────────────────────────────────────────────────
# Shown by default when Fn is NOT pressed.

[layers.main]
widgets = [
    { widget = "battery", mode = "both", show_outline = false, padding = "default" },
    { widget = "clock", format = "%I:%M%P %-e/%m", show_outline = false, outline_color = [0.2, 0.2, 0.2], padding = "default" },
    { widget = "dynamic", show_outline = false },
    { widget = "button", icon = "activities", action = { panel = "media" }, padding = "default" },
]

# ── fn layer ────────────────────────────────────────────────────
# Shown when Fn IS pressed.

[layers.fn]
widgets = [
    { widget = "button", text = "F1", action = { key = ["F1"] } },
    { widget = "button", text = "F2", action = { key = ["F2"] } },
    { widget = "button", text = "F3", action = { key = ["F3"] } },
    { widget = "button", text = "F4", action = { key = ["F4"] } },
    { widget = "button", text = "F5", action = { key = ["F5"] } },
    { widget = "button", text = "F6", action = { key = ["F6"] } },
    { widget = "button", text = "F7", action = { key = ["F7"] } },
    { widget = "button", text = "F8", action = { key = ["F8"] } },
    { widget = "button", text = "F9", action = { key = ["F9"] } },
    { widget = "button", text = "F10", action = { key = ["F10"] } },
    { widget = "button", text = "F11", action = { key = ["F11"] } },
    { widget = "button", text = "F12", action = { key = ["F12"] } },
]

# ── Panels ──────────────────────────────────────────────────────
# Sub-panels opened by { action = { panel = "name" } }.
# Include a back button to return to the previous layer.

[panels.media]
widgets = [
    { widget = "button", icon = "media-skip-backward", action = { key = ["PreviousSong"] }, show_outline = false },
    { widget = "button", icon = "media-playback-pause", action = { key = ["PlayPause"] }, show_outline = false },
    { widget = "button", icon = "media-skip-forward", action = { key = ["NextSong"] }, show_outline = false },
    { widget = "button", icon = "microphone-sensitivity-high", action = { key = ["MicMute"] }, show_outline = false },
    { widget = "button", icon = "audio-volume-high", action = { panel = "audioslider" }},
    { widget = "button", icon = "brightness-high", action = { panel = "screenslider" }},
    { widget = "button", icon = "input-keyboard-brightness", action = { panel = "keyboardslider" }},
]

[panels.audioslider]
widgets = [
    { widget = "slider", icon = "audio-volume-high", slider = "Volume", show_outline = false, padding = 300, margin_left = 1200 },
    { widget = "button", icon = "go-previous", action = { back = true }, show_outline = false, padding = "default" },
]

[panels.screenslider]
widgets = [
    { widget = "slider", icon = "brightness-high", slider = "Brightness", show_outline = false, padding = 300, margin_left = 1200 },
    { widget = "button", icon = "go-previous", action = { back = true }, show_outline = false, padding = "default" },
]

[panels.keyboardslider]
widgets = [
    { widget = "slider", icon = "input-keyboard-brightness", slider = "KeyboardBrightness", show_outline = false, padding = 300, margin_left = 1200 },
    { widget = "button", icon = "go-previous", action = { back = true }, show_outline = false, padding = "default" },
]

# ── App rules for { widget = "dynamic" } ─────────────────────────
# Each section is a window class name. When a window with that class
# is focused, the dynamic widget is replaced by these shortcuts.
# Dynamic inherits the parent widget's common fields (outline, padding,
# icon_size, font_size, theme, etc.) and wraps them in a container.

[app_rules.code]
widgets = [
    { widget = "button", icon = "system-run", action = { key = ["F1"] }},
    { widget = "button", icon = "document-new", action = { key = ["LeftCtrl", "N"] }},
    { widget = "button", icon = "document-save", action = { key = ["LeftCtrl", "S"] }},
