<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

  <!-- ktouchbar-system runs as root (system service) -->
  <policy user="root">
    <allow own="org.ktouchbar.Hardware"/>
  </policy>

  <!-- ktouchbar-user runs as a user (user service) -->
  <policy context="default">
    <allow own="org.ktouchbar.UserInterface"/>
  </policy>

  <!-- Allow all clients to send to both services -->
  <policy context="default">
    <allow send_destination="org.ktouchbar.Hardware"/>
    <allow send_destination="org.ktouchbar.UserInterface"/>
  </policy>

</busconfig>
